<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topper Frnd AI - Dashboard</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --text: #202124; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 30px; }
        .menu-item { padding: 15px; margin: 5px 0; border-radius: 10px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover { background: #e8f0fe; color: var(--primary); }
        .active { background: var(--primary); color: white !important; }

        /* Main Content Styles */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .chat-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); max-width: 800px; margin: auto; }
        textarea { width: 100%; height: 100px; border: 1px solid #ddd; border-radius: 10px; padding: 15px; font-size: 16px; resize: none; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: scale(1.05); }

        /* AI Output Box */
        #aiResponse { margin-top: 30px; padding: 20px; border-left: 5px solid var(--primary); background: #f1f3f4; border-radius: 5px; min-height: 50px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">🎓 Topper Frnd</div>
        <div class="menu-item active" onclick="setMode('Coach')">🤖 AI Study Coach</div>
        <div class="menu-item" onclick="setMode('Code')">💻 Code Mentor</div>
        <div class="menu-item" onclick="setMode('Notes')">📝 Smart Notes</div>
        <div class="menu-item" onclick="setMode('Quiz')">🎯 Quiz Engine</div>
        <div class="menu-item" onclick="setMode('Planner')">📅 Smart Planner</div>
        <div class="menu-item" onclick="setMode('Lightning')">⚡ Lightning Practice</div>
    </div>

    <div class="main-content">
        <h2 id="featureTitle">AI Study Coach</h2>
        <div class="chat-container">
            <textarea id="studentInput" placeholder="Ask your 'Topper Frnd' anything..."></textarea>
            <button onclick="askTopperFrnd()">Get Explanation</button>
            <div id="aiResponse">Your personalized explanation will appear here...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
